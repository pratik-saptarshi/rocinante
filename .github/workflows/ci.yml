name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-build-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build-scope: ${{ steps.build-scope.outputs.scope }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Verify UI esbuild floor
        run: node scripts/check-esbuild-lock.mjs
      - name: Verify open esbuild Dependabot alert is closed
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/check-dependabot-esbuild-alert.sh
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: |
            ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
      - name: Release build seed
        if: ${{ steps.build-scope.outputs.scope == 'release' }}
        run: |
          RELEASE_SEED_START_TS=$(date +%s)
          cargo test \
            --locked \
            --manifest-path src-tauri/Cargo.toml \
            --features analytics \
            --bins \
            --lib \
            --tests \
            --no-run
          RELEASE_SEED_ELAPSED_SECONDS=$(( $(date +%s) - RELEASE_SEED_START_TS ))
          echo "::notice title=Release build seed::scope=release duration_sec=${RELEASE_SEED_ELAPSED_SECONDS}"
      - name: Delta build seed
        if: ${{ steps.build-scope.outputs.scope == 'delta' }}
        run: |
          DELTA_SEED_START_TS=$(date +%s)
          cargo test \
            --locked \
            --manifest-path src-tauri/Cargo.toml \
            --no-default-features \
            --lib \
            --tests \
            --no-run
          DELTA_SEED_ELAPSED_SECONDS=$(( $(date +%s) - DELTA_SEED_START_TS ))
          echo "::notice title=Release build seed::scope=delta duration_sec=${DELTA_SEED_ELAPSED_SECONDS}"

  rust-quality-gates:
    needs: [rust-build-seed]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=release" >> "$GITHUB_ENV"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=delta" >> "$GITHUB_ENV"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: false
      - name: CI gate contract
        run: |
          if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
            cargo test --locked --manifest-path src-tauri/Cargo.toml --test ci_gate_tests
          else
            cargo test --locked --manifest-path src-tauri/Cargo.toml --no-default-features --test ci_gate_tests
          fi

  rust-lint:
    needs: [rust-quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane: [fmt, clippy]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=release" >> "$GITHUB_ENV"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=delta" >> "$GITHUB_ENV"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: false
      - name: Format check
        if: matrix.lane == 'fmt'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Lint
        if: matrix.lane == 'clippy'
        run: |
          LINT_START_TS=$(date +%s)
          if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
            cargo clippy \
              --locked \
              --manifest-path src-tauri/Cargo.toml \
              --features analytics \
              -- -A dead_code -D warnings
          else
            cargo clippy --locked --manifest-path src-tauri/Cargo.toml --no-default-features --lib -- -A dead_code -D warnings
          fi
          LINT_ELAPSED_SECONDS=$(( $(date +%s) - LINT_START_TS ))
          echo "::notice title=Rust quality lint::scope=${CI_RUST_BUILD_SCOPE} lane=${{ matrix.lane }} duration_sec=${LINT_ELAPSED_SECONDS}"

  rust-tests:
    needs: [rust-quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane: [core, storage]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=release" >> "$GITHUB_ENV"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=delta" >> "$GITHUB_ENV"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: false
      - name: Test
        run: |
          TEST_START_TS=$(date +%s)
          if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
            if [[ "${{ matrix.lane }}" == "storage" ]]; then
              cargo test \
                --locked \
                --manifest-path src-tauri/Cargo.toml \
                --features analytics \
                --test storage_duallayer_tests \
                -- --timeout 180
            else
              cargo test \
                --locked \
                --manifest-path src-tauri/Cargo.toml \
                --features analytics \
                --lib \
                --tests \
                --test admin_ingestion_guard_tests \
                --test admin_service_tests \
                --test analytics_snapshot_tests \
                --test auth_tests \
                --test baseline_delta_tests \
                --test budget_guard_tests \
                --test ci_gate_tests \
                --test engine_tests \
                --test fmt_module_order_tests \
                --test git_module_tests \
                --test git_provider_tests \
                --test gtk_free_host_migration_plan_tests \
                --test incident_feedback_tests \
                --test ingestion_backend_tests \
                --test ingestion_transport_tests \
                --test onprem_and_errors_tests \
                --test parser_plugin_tests \
                --test pr_risk_contract_tests \
                --test publish_gate_docs_tests \
                --test release_baseline_handler_tests \
                --test release_baseline_storage_tests \
                --test release_baseline_tests \
                --test roadmap_coherence_tests \
                --test sanitizer_tests \
                --test scoring_audit_tests \
                --test scoring_helpers_tests \
                --test scoring_integrity_tests \
                --test security_advisory_exception_tests \
                --test storage_boundary_tests \
                --test storage_policy_tests \
                --test tauri_command_tests \
                --test team_policy_tests \
                --test telemetry_tests \
                --test triage_tests \
                --test verifier_tests
            fi
          else
            if [[ "${{ matrix.lane }}" != "core" ]]; then
              echo "Skipping non-core lane '${{ matrix.lane }}' on delta scope"
              exit 0
            fi
            cargo test --locked --manifest-path src-tauri/Cargo.toml --no-default-features --lib --tests
          fi
          TEST_ELAPSED_SECONDS=$(( $(date +%s) - TEST_START_TS ))
          echo "::notice title=Rust quality test::scope=${CI_RUST_BUILD_SCOPE} lane=${{ matrix.lane }} duration_sec=${TEST_ELAPSED_SECONDS}"

  rust-coverage:
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
    needs: [rust-quality-gates]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane: [coverage]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-release-v2
          save-if: false
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Rust coverage
        run: |
          COVERAGE_START_TS=$(date +%s)
          mkdir -p target/coverage
          cargo llvm-cov \
            --locked \
            --features analytics \
            --manifest-path src-tauri/Cargo.toml \
            --no-clean \
            --lcov \
            --output-path target/coverage/lcov.info
          COVERAGE_ELAPSED_SECONDS=$(( $(date +%s) - COVERAGE_START_TS ))
          echo "::notice title=Rust coverage::duration_sec=${COVERAGE_ELAPSED_SECONDS}"
      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/coverage/lcov.info
