name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-health:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: CI bootstrap marker
        run: |
          echo "::notice title=CI bootstrap::ci-yaml job graph has started"
          echo "ci_bootstrap=ok" >> "$GITHUB_STEP_SUMMARY"

  ci-workflow-parse:
    needs: [ci-health]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Validate workflow parseability
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          # shellcheck disable=SC2155
          GOBIN="$(go env GOPATH)/bin"
          export PATH="$GOBIN:$PATH"
          actionlint -oneline .github/workflows/ci.yml .github/workflows/security.yml

  ci-scope:
    needs: [ci-workflow-parse]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      needs-rust: ${{ steps.detect.outputs.needs_rust }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 2
      - id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA=""
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ -z "$BASE_SHA" || -z "$HEAD_SHA" ]] || ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            echo "needs_rust=true" >> "$GITHUB_OUTPUT"
            echo "scope_reason=baseline-fallback" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          NEEDS_RUST=false

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue
            case "$path" in
              docs/*|README.md|README.*|CHANGELOG*|*.md|*.txt|*.rst|LICENSE*|SECURITY*|CODE_OF_CONDUCT*)
                continue
                ;;
              *)
                NEEDS_RUST=true
                break
                ;;
            esac
          done <<< "$CHANGED_FILES"

          echo "needs_rust=$NEEDS_RUST" >> "$GITHUB_OUTPUT"
          echo "scope_reason=$([ "$NEEDS_RUST" == "true" ] && echo code-surface-touched || echo docs-only-tweak)" >> "$GITHUB_OUTPUT"

  rust-build-seed:
    needs: [ci-workflow-parse, ci-scope]
    if: ${{ needs.ci-scope.outputs.needs-rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build-scope: ${{ steps.build-scope.outputs.scope }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Verify UI esbuild floor
        run: node scripts/check-esbuild-lock.mjs
      - name: Verify open esbuild Dependabot alert is closed
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/check-dependabot-esbuild-alert.sh
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: |
            ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
      - name: Release build seed
        if: ${{ steps.build-scope.outputs.scope == 'release' }}
        run: |
          RELEASE_SEED_START_TS=$(date +%s)
            timeout 900s cargo test \
              --locked \
              --manifest-path src-tauri/Cargo.toml \
              --features analytics \
            --bins \
            --lib \
            --tests \
            --no-run
          RELEASE_SEED_ELAPSED_SECONDS=$(( $(date +%s) - RELEASE_SEED_START_TS ))
          echo "::notice title=Release build seed::scope=release duration_sec=${RELEASE_SEED_ELAPSED_SECONDS}"
      - name: Delta build seed
        if: ${{ steps.build-scope.outputs.scope == 'delta' }}
        run: |
          DELTA_SEED_START_TS=$(date +%s)
            timeout 900s cargo test \
              --locked \
              --manifest-path src-tauri/Cargo.toml \
              --no-default-features \
            --lib \
            --tests \
            --no-run
          DELTA_SEED_ELAPSED_SECONDS=$(( $(date +%s) - DELTA_SEED_START_TS ))
          echo "::notice title=Release build seed::scope=delta duration_sec=${DELTA_SEED_ELAPSED_SECONDS}"

  rust-quality-gates:
    needs: [rust-build-seed, ci-scope]
    if: ${{ needs.ci-scope.outputs.needs-rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=release" >> "$GITHUB_ENV"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=delta" >> "$GITHUB_ENV"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: false
      - name: CI gate contract
        run: |
          if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
            timeout 900s cargo test --locked --manifest-path src-tauri/Cargo.toml --test ci_gate_tests
          else
            timeout 900s cargo test --locked --manifest-path src-tauri/Cargo.toml --no-default-features --test ci_gate_tests
          fi

  rust-lint:
    needs: [rust-quality-gates, ci-scope]
    if: ${{ needs.ci-scope.outputs.needs-rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane: [fmt, clippy]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=release" >> "$GITHUB_ENV"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=delta" >> "$GITHUB_ENV"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: false
      - name: Format check
        if: matrix.lane == 'fmt'
        run: timeout 900s cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Lint
        if: matrix.lane == 'clippy'
        run: |
          LINT_START_TS=$(date +%s)
          if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
            timeout 900s cargo clippy \
              --locked \
              --manifest-path src-tauri/Cargo.toml \
              --features analytics \
              -- -A dead_code -D warnings
          else
            timeout 900s cargo clippy --locked --manifest-path src-tauri/Cargo.toml --no-default-features --lib -- -A dead_code -D warnings
          fi
          LINT_ELAPSED_SECONDS=$(( $(date +%s) - LINT_START_TS ))
          echo "::notice title=Rust quality lint::scope=${CI_RUST_BUILD_SCOPE} lane=${{ matrix.lane }} duration_sec=${LINT_ELAPSED_SECONDS}"

  rust-tests:
    needs: [rust-quality-gates, ci-scope]
    if: ${{ needs.ci-scope.outputs.needs-rust == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane: [core, storage]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=release" >> "$GITHUB_ENV"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
            echo "CI_RUST_BUILD_SCOPE=delta" >> "$GITHUB_ENV"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-${{ steps.build-scope.outputs.scope }}-v2
          save-if: false
      - name: Test
        run: |
          TEST_START_TS=$(date +%s)
            if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
              if [[ "${{ matrix.lane }}" == "storage" ]]; then
              timeout 900s cargo test \
                --locked \
                --manifest-path src-tauri/Cargo.toml \
                --features analytics \
                --test storage_duallayer_tests
            else
              timeout 900s cargo test \
                --locked \
                --manifest-path src-tauri/Cargo.toml \
                --features analytics \
                --lib \
                --tests \
                --test admin_ingestion_guard_tests \
                --test admin_service_tests \
                --test analytics_snapshot_tests \
                --test auth_tests \
                --test baseline_delta_tests \
                --test budget_guard_tests \
                --test ci_gate_tests \
                --test engine_tests \
                --test fmt_module_order_tests \
                --test git_module_tests \
                --test git_provider_tests \
                --test gtk_free_host_migration_plan_tests \
                --test incident_feedback_tests \
                --test ingestion_backend_tests \
                --test ingestion_transport_tests \
                --test onprem_and_errors_tests \
                --test parser_plugin_tests \
                --test pr_risk_contract_tests \
                --test publish_gate_docs_tests \
                --test release_baseline_handler_tests \
                --test release_baseline_storage_tests \
                --test release_baseline_tests \
                --test roadmap_coherence_tests \
                --test sanitizer_tests \
                --test scoring_audit_tests \
                --test scoring_helpers_tests \
                --test scoring_integrity_tests \
                --test security_advisory_exception_tests \
                --test storage_boundary_tests \
                --test storage_policy_tests \
                --test tauri_command_tests \
                --test team_policy_tests \
                --test telemetry_tests \
                --test triage_tests \
                --test verifier_tests
            fi
          else
            if [[ "${{ matrix.lane }}" != "core" ]]; then
              echo "Skipping non-core lane '${{ matrix.lane }}' on delta scope"
              exit 0
            fi
            timeout 900s cargo test --locked --manifest-path src-tauri/Cargo.toml --no-default-features --lib --tests
          fi
          TEST_ELAPSED_SECONDS=$(( $(date +%s) - TEST_START_TS ))
          echo "::notice title=Rust quality test::scope=${CI_RUST_BUILD_SCOPE} lane=${{ matrix.lane }} duration_sec=${TEST_ELAPSED_SECONDS}"

  rust-coverage:
    if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')) && needs.ci-scope.outputs.needs-rust == 'true' }}
    needs: [rust-quality-gates, ci-scope]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        lane: [coverage]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: rust-cache-release-v2
          save-if: false
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Rust coverage
        run: |
          COVERAGE_START_TS=$(date +%s)
          mkdir -p target/coverage
          timeout 900s cargo llvm-cov \
            --locked \
            --features analytics \
            --manifest-path src-tauri/Cargo.toml \
            --no-clean \
            --lcov \
            --output-path target/coverage/lcov.info
          COVERAGE_ELAPSED_SECONDS=$(( $(date +%s) - COVERAGE_START_TS ))
          echo "::notice title=Rust coverage::duration_sec=${COVERAGE_ELAPSED_SECONDS}"
      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/coverage/lcov.info

  test:
    needs:
      - ci-workflow-parse
      - ci-scope
      - rust-build-seed
      - rust-quality-gates
      - rust-lint
      - rust-tests
      - rust-coverage
    runs-on: ubuntu-latest
    if: ${{ always() }}
    timeout-minutes: 5
    steps:
      - name: Gate summary
        shell: bash
        run: |
          if [[ "${{ needs.ci-workflow-parse.result }}" != "success" ]]; then
            echo "workflow parse failed or was skipped unexpectedly"
            exit 1
          fi

          if [[ "${{ needs.ci-scope.result }}" == "failure" ]]; then
            echo "scope detection failed"
            exit 1
          fi

          if [[ "${{ needs.rust-build-seed.result }}" == "failure" || "${{ needs.rust-build-seed.result }}" == "cancelled" ]]; then
            echo "rust build seed failed or was cancelled"
            exit 1
          fi

          if [[ "${{ needs.rust-quality-gates.result }}" == "failure" || "${{ needs.rust-quality-gates.result }}" == "cancelled" ]]; then
            echo "rust quality gates failed or were cancelled"
            exit 1
          fi

          if [[ "${{ needs.rust-lint.result }}" == "failure" || "${{ needs.rust-lint.result }}" == "cancelled" ]]; then
            echo "rust lint failed or was cancelled"
            exit 1
          fi

          if [[ "${{ needs.rust-tests.result }}" == "failure" || "${{ needs.rust-tests.result }}" == "cancelled" ]]; then
            echo "rust tests failed or were cancelled"
            exit 1
          fi

          if [[ "${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}" == "true" && "${{ needs.rust-coverage.result }}" != "skipped" ]]; then
            if [[ "${{ needs.rust-coverage.result }}" == "failure" || "${{ needs.rust-coverage.result }}" == "cancelled" ]]; then
              echo "rust coverage failed or was cancelled"
              exit 1
            fi
          fi

          echo "All required CI stages completed"
