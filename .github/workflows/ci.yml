name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: Lint
        run: cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - name: Binary check
        run: cargo check --locked --manifest-path src-tauri/Cargo.toml --bins
      - name: Test
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --lib --tests
      - name: CI gate contract
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --test ci_gate_tests

  rust-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Rust coverage
        run: |
          mkdir -p target/coverage
          cargo llvm-cov \
            --locked \
            --manifest-path src-tauri/Cargo.toml \
            --lcov \
            --output-path target/coverage/lcov.info
      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/coverage/lcov.info
