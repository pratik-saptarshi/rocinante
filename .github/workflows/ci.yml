name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-build-seed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build-scope: ${{ steps.build-scope.outputs.scope }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Seed job timing baseline
        run: |
          echo "SEED_START_TS=$(date +%s)" >> "$GITHUB_ENV"
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - id: build-scope
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ startsWith(github.ref, 'refs/heads/release/') }}" == "true" ]]; then
            echo "scope=release" >> "$GITHUB_OUTPUT"
          else
            echo "scope=delta" >> "$GITHUB_OUTPUT"
          fi
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: |
            ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') || github.event_name == 'pull_request' }}
      - name: Release build seed
        if: ${{ steps.build-scope.outputs.scope == 'release' }}
        run: |
          command_start_ts=$(date +%s)
          cargo test \
            --locked \
            --manifest-path src-tauri/Cargo.toml \
            --all-targets \
            --no-run
          command_seconds=$(( $(date +%s) - command_start_ts ))
          seed_total_seconds=$(( $(date +%s) - SEED_START_TS ))
          {
            echo "## Rust Build Seed Telemetry"
            echo "- mode: release"
            echo "- command: cargo test --all-targets --no-run"
            echo "- command_duration_seconds: ${command_seconds}"
            echo "- job_duration_seconds: ${seed_total_seconds}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Rust Build Seed::release frontier=${command_seconds}s job=${seed_total_seconds}s"
      - name: Delta build seed
        if: ${{ steps.build-scope.outputs.scope == 'delta' }}
        run: |
          command_start_ts=$(date +%s)
          cargo test \
            --locked \
            --manifest-path src-tauri/Cargo.toml \
            --lib \
            --tests \
            --no-run
          command_seconds=$(( $(date +%s) - command_start_ts ))
          seed_total_seconds=$(( $(date +%s) - SEED_START_TS ))
          {
            echo "## Rust Build Seed Telemetry"
            echo "- mode: delta"
            echo "- command: cargo test --lib --tests --no-run"
            echo "- command_duration_seconds: ${command_seconds}"
            echo "- job_duration_seconds: ${seed_total_seconds}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Rust Build Seed::delta frontier=${command_seconds}s job=${seed_total_seconds}s"

  test:
    needs: [rust-build-seed]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI_RUST_BUILD_SCOPE: ${{ needs.rust-build-seed.outputs.build-scope }}
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Test job timing baseline
        run: |
          echo "TEST_START_TS=$(date +%s)" >> "$GITHUB_ENV"
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.96.1
        with:
          components: clippy, rustfmt
      - name: Prime Rust toolchain
        run: |
          rustc --version
          cargo --version
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: false
      - name: Format check
        run: |
          step_start_ts=$(date +%s)
          cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
          step_duration_seconds=$(( $(date +%s) - step_start_ts ))
          {
            echo "## Rust Test Job Telemetry"
            echo "- scope: ${CI_RUST_BUILD_SCOPE}"
            echo "- format_check_duration_seconds: ${step_duration_seconds}"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Lint
        run: |
          step_start_ts=$(date +%s)
          if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
            cargo clippy --locked --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
          else
            cargo clippy --locked --manifest-path src-tauri/Cargo.toml --lib -- -D warnings
          fi
          step_duration_seconds=$(( $(date +%s) - step_start_ts ))
          echo "- lint_duration_seconds: ${step_duration_seconds}" >> "$GITHUB_STEP_SUMMARY"
      - name: Binary check
        if: ${{ env.CI_RUST_BUILD_SCOPE == 'release' }}
        run: |
          step_start_ts=$(date +%s)
          cargo check --locked --manifest-path src-tauri/Cargo.toml --bins
          step_duration_seconds=$(( $(date +%s) - step_start_ts ))
          echo "- binary_check_duration_seconds: ${step_duration_seconds}" >> "$GITHUB_STEP_SUMMARY"
      - name: Test
        run: |
          step_start_ts=$(date +%s)
          if [[ "$CI_RUST_BUILD_SCOPE" == "release" ]]; then
            cargo test --locked --manifest-path src-tauri/Cargo.toml --lib --tests
          else
            cargo test --locked --manifest-path src-tauri/Cargo.toml --lib
          fi
          step_duration_seconds=$(( $(date +%s) - step_start_ts ))
          {
            echo "- test_duration_seconds: ${step_duration_seconds}"
            echo "- test_job_total_duration_seconds: $(( $(date +%s) - TEST_START_TS ))"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: CI gate contract
        run: cargo test --locked --manifest-path src-tauri/Cargo.toml --test ci_gate_tests
      - name: Report test job totals
        if: always()
        run: |
          {
            echo "- test_job_total_wall_clock_seconds: $(( $(date +%s) - TEST_START_TS ))"
          } >> "$GITHUB_STEP_SUMMARY"

  rust-coverage:
    if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/') }}
    needs: [rust-build-seed]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 1
      - name: Coverage job timing baseline
        run: |
          echo "COVERAGE_START_TS=$(date +%s)" >> "$GITHUB_ENV"
      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@1.96.1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          save-if: false
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Rust coverage
        run: |
          step_start_ts=$(date +%s)
          mkdir -p target/coverage
          cargo llvm-cov \
            --locked \
            --manifest-path src-tauri/Cargo.toml \
            --lcov \
            --output-path target/coverage/lcov.info
          step_duration_seconds=$(( $(date +%s) - step_start_ts ))
          {
            echo "## Rust Coverage Telemetry"
            echo "- command: cargo llvm-cov --lcov --output-path target/coverage/lcov.info"
            echo "- duration_seconds: ${step_duration_seconds}"
            echo "- job_total_duration_seconds: $(( $(date +%s) - COVERAGE_START_TS ))"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Rust coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/coverage/lcov.info
